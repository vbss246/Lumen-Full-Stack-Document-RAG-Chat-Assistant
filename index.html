<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Lumen - A conversational RAG assistant that answers questions based solely on your uploaded documents.">
  <title>Lumen - Chat with your Documents</title>
  <!-- Load typography from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <!-- Load anime.js library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <!-- Load styles -->
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <!-- Fullscreen Background Theme Gradient Layer -->
  <div id="bg-color-layer" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2; background: var(--bg-gradient); transition: background 0.6s ease;"></div>
  <!-- Background Canvas for Ripples -->
  <canvas id="background-canvas" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none;"></canvas>
  <!-- Background Element Container for Anime.js Orbs -->
  <div id="bg-animation-container" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; overflow: hidden;"></div>

  <!-- Main Grid Dashboard Page -->
  <div id="dashboard-page" class="dashboard-layout">
    
    <!-- Left Sidebar Placeholder -->
    <aside id="sidebar-root" class="layout-sidebar"></aside>
    
    <!-- Central Main View Area Placeholder -->
    <main id="chat-root" class="layout-chat-container">
      <div id="header-root"></div>
      <div id="chat-area-root" style="flex: 1; display: flex; flex-direction: column; overflow: hidden;"></div>
    </main>
    
    <!-- Right Sidebar Placeholder -->
    <aside id="right-sidebar-root" class="layout-right-sidebar"></aside>

  </div>

  <!-- Global Modal Placeholder -->
  <div id="modal-root"></div>

  <!-- Application Entry Point JS -->
  <script type="module" src="src/main.js"></script>
</body>
</html>
