<div class="sidebar-header">
  <!-- New Chat Pill Button -->
  <button id="btn-new-chat" class="btn-primary" style="width: 100%; border-radius: var(--radius-md); padding: 14px 20px;">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;">
      <line x1="12" y1="5" x2="12" y2="19"></line>
      <line x1="5" y1="12" x2="19" y2="12"></line>
    </svg>
    New Chat
  </button>

  <!-- Search Chats Form -->
  <div class="input-search-wrapper">
    <svg class="input-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"></circle>
      <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
    </svg>
    <input id="sidebar-search-input" class="input-search" type="text" placeholder="Search chats...">
  </div>
</div>

<div class="sidebar-content">
  <div class="sidebar-section-title">Recent Chats</div>
  <!-- Scrollable List -->
  <ul id="recent-chats-list" class="recent-chats-container">
    <!-- Recent chat list items injected dynamically -->
  </ul>
</div>
